# ============================================================
#  Ren'Py iOS Library Builder
#  Builds: libSDL2.a, libSDL2_image.a, libSDL2_ttf.a,
#          libSDL2_mixer.a, libpython3.12.a and companions
#  Target: iOS arm64 (device) + sim-arm64 + sim-x86_64
#  SDK:    iPhoneOS18.4.sdk from xybp888/iOS-SDKs
# ============================================================

name: Build Ren'Py iOS Libraries

on:
  workflow_dispatch:
    inputs:
      ios_sdk_version:
        description: "iOS SDK version to use (from xybp888/iOS-SDKs)"
        required: false
        default: "18.4"
      build_archs:
        description: "Architectures to build (comma-separated: arm64,sim-arm64,sim-x86_64)"
        required: false
        default: "arm64,sim-arm64,sim-x86_64"

env:
  # Adjust these to match the renpy-build tag / branch you want
  RENPY_BUILD_REF: "master"
  # The SDK folder name inside xybp888/iOS-SDKs
  IOS_SDK_VERSION: ${{ github.event.inputs.ios_sdk_version || '18.4' }}
  # Where we'll stage the SDK for renpy-build
  SDK_STAGING: ${{ github.workspace }}/sdk-staging
  # Output directory for collected .a files
  OUTPUT_DIR: ${{ github.workspace }}/renpy-ios-libs

jobs:
  # ----------------------------------------------------------
  #  Build arm64 (real device)
  # ----------------------------------------------------------
  build-arm64:
    name: "Build ios/arm64"
    runs-on: macos-14          # Apple-silicon runner; has Xcode + clang for iOS
    timeout-minutes: 180

    steps:
      - name: Checkout renpy-build
        uses: actions/checkout@v4
        with:
          repository: renpy/renpy-build
          ref: ${{ env.RENPY_BUILD_REF }}
          path: renpy-build

      # ---- Fetch iOS SDK (sparse clone — only the SDK folder) ----
      - name: Fetch iOS SDK (${{ env.IOS_SDK_VERSION }}) from xybp888/iOS-SDKs
        run: |
          SDK_NAME="iPhoneOS${IOS_SDK_VERSION}.sdk"
          echo "Fetching $SDK_NAME …"

          # Sparse clone — only the folder we need (much faster than full clone)
          git clone \
            --depth 1 \
            --filter=blob:none \
            --sparse \
            https://github.com/xybp888/iOS-SDKs.git \
            ios-sdks-sparse

          cd ios-sdks-sparse
          git sparse-checkout set "$SDK_NAME"
          cd ..

          # Stage the SDK where renpy-build / Xcode toolchain expects it
          mkdir -p "$SDK_STAGING"
          cp -r "ios-sdks-sparse/$SDK_NAME" "$SDK_STAGING/$SDK_NAME"

          # Also place it inside the Xcode toolchain so xcrun can find it
          PLATFORM_DIR="$(xcode-select -p)/Platforms/iPhoneOS.platform/Developer/SDKs"
          sudo mkdir -p "$PLATFORM_DIR"
          sudo cp -r "$SDK_STAGING/$SDK_NAME" "$PLATFORM_DIR/$SDK_NAME" || true

          echo "SDK_NAME=$SDK_NAME" >> "$GITHUB_ENV"
          echo "IOS_SDK_PATH=$SDK_STAGING/$SDK_NAME" >> "$GITHUB_ENV"

      # ---- System dependencies ----
      - name: Install build dependencies (Homebrew)
        run: |
          brew update
          brew install \
            autoconf automake libtool pkg-config nasm \
            cmake ninja wget curl git

      # ---- Python 3.12 (host build tools only) ----
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install \
            cython \
            setuptools \
            wheel \
            requests

      # ---- Download required source tarballs ----
      # renpy-build expects certain tarballs in ./tars/
      # It will download many automatically, but some SDL versions
      # need to be placed manually.  We download them here from
      # official mirrors.
      - name: Download source tarballs into tars/
        working-directory: renpy-build
        run: |
          mkdir -p tars
          cd tars

          # Read versions from renpy-build task files
          SDL2_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2.py         2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.30.9")
          SDL2_IMAGE_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2_image.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.8.2")
          SDL2_TTF_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2_ttf.py   2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.22.0")
          SDL2_MIXER_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2_mixer.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.8.0")

          echo "SDL2=$SDL2_VER  SDL2_image=$SDL2_IMAGE_VER  SDL2_ttf=$SDL2_TTF_VER  SDL2_mixer=$SDL2_MIXER_VER"

          BASE="https://github.com/libsdl-org"

          download_if_missing() {
            local file="$1"; local url="$2"
            [ -f "$file" ] && echo "  $file already present" && return
            echo "  Downloading $file …"
            curl -fsSL -o "$file" "$url"
          }

          download_if_missing "SDL2-${SDL2_VER}.tar.gz" \
            "${BASE}/SDL/releases/download/release-${SDL2_VER}/SDL2-${SDL2_VER}.tar.gz"

          download_if_missing "SDL2_image-${SDL2_IMAGE_VER}.tar.gz" \
            "${BASE}/SDL_image/releases/download/release-${SDL2_IMAGE_VER}/SDL2_image-${SDL2_IMAGE_VER}.tar.gz"

          download_if_missing "SDL2_ttf-${SDL2_TTF_VER}.tar.gz" \
            "${BASE}/SDL_ttf/releases/download/release-${SDL2_TTF_VER}/SDL2_ttf-${SDL2_TTF_VER}.tar.gz"

          download_if_missing "SDL2_mixer-${SDL2_MIXER_VER}.tar.gz" \
            "${BASE}/SDL_mixer/releases/download/release-${SDL2_MIXER_VER}/SDL2_mixer-${SDL2_MIXER_VER}.tar.gz"

      # ---- Run renpy-build prepare ----
      - name: Prepare renpy-build environment
        working-directory: renpy-build
        run: |
          # prepare.sh is interactive in places; we override with env vars
          # and skip steps that need root or network that will time out
          export DEBIAN_FRONTEND=noninteractive
          # Install the python venv tools that prepare.sh would set up
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install cython setuptools wheel requests

      # ---- Build ios/arm64 ----
      - name: Build ios/arm64
        working-directory: renpy-build
        env:
          XCODE_IOS_SDK: ${{ env.IOS_SDK_PATH }}
        run: |
          source venv/bin/activate

          # Point the build system at our downloaded SDK
          export RENPY_IOS_SDK="$IOS_SDK_PATH"

          ./build.sh \
            --platform ios \
            --arch arm64 \
            --python 3

      # ---- Collect outputs ----
      - name: Collect built libraries (arm64)
        run: |
          ARCH_OUT="${OUTPUT_DIR}/arm64"
          mkdir -p "$ARCH_OUT"

          # renpy-build places outputs under tmp/install/<platform>-<arch>/lib/
          # Adjust glob if your renpy-build version uses a different path
          find renpy-build/tmp -name "*.a" \
            | while read f; do
                echo "  Found: $f"
                cp "$f" "$ARCH_OUT/" 2>/dev/null || true
              done

          # Also grab headers
          HDR_OUT="${OUTPUT_DIR}/include"
          mkdir -p "$HDR_OUT"
          find renpy-build/tmp -path "*/include/SDL2" -type d \
            | head -1 \
            | xargs -I{} cp -r {} "$HDR_OUT/" 2>/dev/null || true
          find renpy-build/tmp -name "*.h" -path "*/python3.12/*" \
            | head -1 \
            | xargs -I{} dirname {} \
            | xargs -I{} cp -r {} "$HDR_OUT/python3.12" 2>/dev/null || true

          echo "=== arm64 libraries ==="
          ls -lh "$ARCH_OUT"/*.a 2>/dev/null || echo "(none found — check build log)"

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-libs-arm64
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 7

  # ----------------------------------------------------------
  #  Build sim-arm64 (simulator on Apple Silicon)
  # ----------------------------------------------------------
  build-sim-arm64:
    name: "Build ios/sim-arm64"
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout renpy-build
        uses: actions/checkout@v4
        with:
          repository: renpy/renpy-build
          ref: ${{ env.RENPY_BUILD_REF }}
          path: renpy-build

      - name: Fetch iOS Simulator SDK (${{ env.IOS_SDK_VERSION }}) from xybp888/iOS-SDKs
        run: |
          SIM_SDK_NAME="iPhoneSimulator${IOS_SDK_VERSION}.sdk"
          echo "Fetching $SIM_SDK_NAME (falling back to iPhoneOS SDK if not present) …"

          git clone \
            --depth 1 \
            --filter=blob:none \
            --sparse \
            https://github.com/xybp888/iOS-SDKs.git \
            ios-sdks-sparse

          cd ios-sdks-sparse
          git sparse-checkout set "$SIM_SDK_NAME" 2>/dev/null || \
            git sparse-checkout set "iPhoneOS${IOS_SDK_VERSION}.sdk"
          cd ..

          mkdir -p "$SDK_STAGING"

          if [ -d "ios-sdks-sparse/$SIM_SDK_NAME" ]; then
            cp -r "ios-sdks-sparse/$SIM_SDK_NAME" "$SDK_STAGING/$SIM_SDK_NAME"
            SIM_SDK_PATH="$SDK_STAGING/$SIM_SDK_NAME"
          else
            # Use device SDK as fallback — simulator builds may still work
            cp -r "ios-sdks-sparse/iPhoneOS${IOS_SDK_VERSION}.sdk" \
                  "$SDK_STAGING/iPhoneOS${IOS_SDK_VERSION}.sdk"
            SIM_SDK_PATH="$SDK_STAGING/iPhoneOS${IOS_SDK_VERSION}.sdk"
          fi

          echo "SIM_SDK_PATH=$SIM_SDK_PATH" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          brew update
          brew install autoconf automake libtool pkg-config nasm cmake ninja wget curl

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: pip install --upgrade pip cython setuptools wheel requests

      - name: Download source tarballs
        working-directory: renpy-build
        run: |
          mkdir -p tars && cd tars
          SDL2_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.30.9")
          SDL2_IMAGE_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2_image.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.8.2")
          SDL2_TTF_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2_ttf.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.22.0")
          SDL2_MIXER_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2_mixer.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.8.0")
          BASE="https://github.com/libsdl-org"
          for entry in "SDL2-${SDL2_VER}.tar.gz SDL/releases/download/release-${SDL2_VER}" \
                       "SDL2_image-${SDL2_IMAGE_VER}.tar.gz SDL_image/releases/download/release-${SDL2_IMAGE_VER}" \
                       "SDL2_ttf-${SDL2_TTF_VER}.tar.gz SDL_ttf/releases/download/release-${SDL2_TTF_VER}" \
                       "SDL2_mixer-${SDL2_MIXER_VER}.tar.gz SDL_mixer/releases/download/release-${SDL2_MIXER_VER}"; do
            FILE=$(echo "$entry" | awk '{print $1}')
            SUBPATH=$(echo "$entry" | awk '{print $2}')
            [ -f "$FILE" ] || curl -fsSL -o "$FILE" "${BASE}/${SUBPATH}/${FILE}"
          done

      - name: Prepare build environment
        working-directory: renpy-build
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip cython setuptools wheel requests

      - name: Build ios/sim-arm64
        working-directory: renpy-build
        run: |
          source venv/bin/activate
          export RENPY_IOS_SDK="$SIM_SDK_PATH"
          ./build.sh --platform ios --arch sim-arm64 --python 3

      - name: Collect built libraries (sim-arm64)
        run: |
          ARCH_OUT="${OUTPUT_DIR}/sim-arm64"
          mkdir -p "$ARCH_OUT"
          find renpy-build/tmp -name "*.a" \
            | while read f; do cp "$f" "$ARCH_OUT/" 2>/dev/null || true; done
          echo "=== sim-arm64 libraries ==="
          ls -lh "$ARCH_OUT"/*.a 2>/dev/null || echo "(none found)"

      - name: Upload sim-arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-libs-sim-arm64
          path: ${{ env.OUTPUT_DIR }}/sim-arm64/
          retention-days: 7

  # ----------------------------------------------------------
  #  Build sim-x86_64 (simulator on Intel)
  # ----------------------------------------------------------
  build-sim-x86_64:
    name: "Build ios/sim-x86_64"
    runs-on: macos-13          # Intel runner for x86_64 simulator slices
    timeout-minutes: 180

    steps:
      - name: Checkout renpy-build
        uses: actions/checkout@v4
        with:
          repository: renpy/renpy-build
          ref: ${{ env.RENPY_BUILD_REF }}
          path: renpy-build

      - name: Fetch iOS SDK from xybp888/iOS-SDKs
        run: |
          SIM_SDK_NAME="iPhoneSimulator${IOS_SDK_VERSION}.sdk"
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/xybp888/iOS-SDKs.git ios-sdks-sparse
          cd ios-sdks-sparse
          git sparse-checkout set "$SIM_SDK_NAME" 2>/dev/null || \
            git sparse-checkout set "iPhoneOS${IOS_SDK_VERSION}.sdk"
          cd ..
          mkdir -p "$SDK_STAGING"
          if [ -d "ios-sdks-sparse/$SIM_SDK_NAME" ]; then
            cp -r "ios-sdks-sparse/$SIM_SDK_NAME" "$SDK_STAGING/$SIM_SDK_NAME"
            echo "SIM_SDK_PATH=$SDK_STAGING/$SIM_SDK_NAME" >> "$GITHUB_ENV"
          else
            cp -r "ios-sdks-sparse/iPhoneOS${IOS_SDK_VERSION}.sdk" \
                  "$SDK_STAGING/iPhoneOS${IOS_SDK_VERSION}.sdk"
            echo "SIM_SDK_PATH=$SDK_STAGING/iPhoneOS${IOS_SDK_VERSION}.sdk" >> "$GITHUB_ENV"
          fi

      - name: Install build dependencies
        run: |
          brew update
          brew install autoconf automake libtool pkg-config nasm cmake ninja wget curl

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: pip install --upgrade pip cython setuptools wheel requests

      - name: Download source tarballs
        working-directory: renpy-build
        run: |
          mkdir -p tars && cd tars
          SDL2_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.30.9")
          SDL2_IMAGE_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2_image.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.8.2")
          SDL2_TTF_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2_ttf.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.22.0")
          SDL2_MIXER_VER=$(grep -m1 'version\s*=\s*"' ../tasks/sdl2_mixer.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "2.8.0")
          BASE="https://github.com/libsdl-org"
          for entry in "SDL2-${SDL2_VER}.tar.gz SDL/releases/download/release-${SDL2_VER}" \
                       "SDL2_image-${SDL2_IMAGE_VER}.tar.gz SDL_image/releases/download/release-${SDL2_IMAGE_VER}" \
                       "SDL2_ttf-${SDL2_TTF_VER}.tar.gz SDL_ttf/releases/download/release-${SDL2_TTF_VER}" \
                       "SDL2_mixer-${SDL2_MIXER_VER}.tar.gz SDL_mixer/releases/download/release-${SDL2_MIXER_VER}"; do
            FILE=$(echo "$entry" | awk '{print $1}')
            SUBPATH=$(echo "$entry" | awk '{print $2}')
            [ -f "$FILE" ] || curl -fsSL -o "$FILE" "${BASE}/${SUBPATH}/${FILE}"
          done

      - name: Prepare build environment
        working-directory: renpy-build
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip cython setuptools wheel requests

      - name: Build ios/sim-x86_64
        working-directory: renpy-build
        run: |
          source venv/bin/activate
          export RENPY_IOS_SDK="$SIM_SDK_PATH"
          ./build.sh --platform ios --arch sim-x86_64 --python 3

      - name: Collect built libraries (sim-x86_64)
        run: |
          ARCH_OUT="${OUTPUT_DIR}/sim-x86_64"
          mkdir -p "$ARCH_OUT"
          find renpy-build/tmp -name "*.a" \
            | while read f; do cp "$f" "$ARCH_OUT/" 2>/dev/null || true; done
          echo "=== sim-x86_64 libraries ==="
          ls -lh "$ARCH_OUT"/*.a 2>/dev/null || echo "(none found)"

      - name: Upload sim-x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-libs-sim-x86_64
          path: ${{ env.OUTPUT_DIR }}/sim-x86_64/
          retention-days: 7

  # ----------------------------------------------------------
  #  Merge: create XCFramework-style fat libs + final zip
  # ----------------------------------------------------------
  package:
    name: "Package — lipo + zip"
    runs-on: macos-14
    needs: [build-arm64, build-sim-arm64, build-sim-x86_64]
    timeout-minutes: 30

    steps:
      - name: Download all arch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ios-libs-*
          path: downloaded-libs/
          merge-multiple: false

      - name: Inspect downloaded libs
        run: find downloaded-libs -name "*.a" | sort

      - name: Create fat simulator libs (sim-arm64 + sim-x86_64)
        run: |
          mkdir -p fat/sim fat/device fat/universal

          SIM_ARM64="downloaded-libs/ios-libs-sim-arm64"
          SIM_X86="downloaded-libs/ios-libs-sim-x86_64"
          DEVICE="downloaded-libs/ios-libs-arm64/arm64"

          # Collect all unique lib names across all archs
          ALL_LIBS=$(find "$SIM_ARM64" "$SIM_X86" "$DEVICE" -name "*.a" -exec basename {} \; \
                     | sort -u)

          echo "=== Libraries to process ==="
          echo "$ALL_LIBS"

          for LIB in $ALL_LIBS; do
            INPUTS=()
            [ -f "$SIM_ARM64/$LIB" ] && INPUTS+=("$SIM_ARM64/$LIB")
            [ -f "$SIM_X86/$LIB"   ] && INPUTS+=("$SIM_X86/$LIB")

            if [ ${#INPUTS[@]} -gt 1 ]; then
              lipo -create "${INPUTS[@]}" -output "fat/sim/$LIB"
              echo "  fat/sim/$LIB  ✓"
            elif [ ${#INPUTS[@]} -eq 1 ]; then
              cp "${INPUTS[0]}" "fat/sim/$LIB"
              echo "  fat/sim/$LIB  (single arch copy)"
            fi

            # Device slice
            [ -f "$DEVICE/$LIB" ] && cp "$DEVICE/$LIB" "fat/device/$LIB"

            # Universal (device + fat-sim) — handy for local testing
            UNI_INPUTS=()
            [ -f "fat/device/$LIB" ] && UNI_INPUTS+=("fat/device/$LIB")
            [ -f "fat/sim/$LIB"    ] && UNI_INPUTS+=("fat/sim/$LIB")
            if [ ${#UNI_INPUTS[@]} -gt 1 ]; then
              lipo -create "${UNI_INPUTS[@]}" -output "fat/universal/$LIB" 2>/dev/null || \
                cp "${UNI_INPUTS[0]}" "fat/universal/$LIB"
            elif [ ${#UNI_INPUTS[@]} -eq 1 ]; then
              cp "${UNI_INPUTS[0]}" "fat/universal/$LIB"
            fi
          done

          # Copy headers from arm64 artifact if present
          HDR_SRC="downloaded-libs/ios-libs-arm64/include"
          [ -d "$HDR_SRC" ] && cp -r "$HDR_SRC" fat/include || true

      - name: Show library info
        run: |
          echo "===== Device (arm64) ====="
          for f in fat/device/*.a; do
            [ -f "$f" ] || continue
            printf "  %-40s  %s\n" "$(basename $f)" "$(lipo -info $f 2>&1 | sed 's/.*: //')"
          done

          echo ""
          echo "===== Simulator (fat) ====="
          for f in fat/sim/*.a; do
            [ -f "$f" ] || continue
            printf "  %-40s  %s\n" "$(basename $f)" "$(lipo -info $f 2>&1 | sed 's/.*: //')"
          done

      - name: Create final zip archive
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          ZIP_NAME="renpy-ios-libs-${TIMESTAMP}.zip"

          # Lay out a clean directory structure
          STAGE="renpy-ios-libs"
          mkdir -p "$STAGE/device"
          mkdir -p "$STAGE/simulator"
          mkdir -p "$STAGE/universal"

          cp -r fat/device/*  "$STAGE/device/"  2>/dev/null || true
          cp -r fat/sim/*     "$STAGE/simulator/" 2>/dev/null || true
          cp -r fat/universal/* "$STAGE/universal/" 2>/dev/null || true
          [ -d fat/include ] && cp -r fat/include "$STAGE/" || true

          # Write a manifest
          cat > "$STAGE/MANIFEST.txt" <<'EOF'
          Ren'Py iOS Library Build
          ========================
          Built by: GitHub Actions
          Repo:     renpy/renpy-build (master)
          SDK:      xybp888/iOS-SDKs

          Directory layout:
            device/     — arm64 (real device)
            simulator/  — arm64 + x86_64 fat (Simulator)
            universal/  — device + simulator fat (local linking / testing)
            include/    — SDL2 and Python 3.12 headers

          Key libraries:
            libSDL2.a
            libSDL2_image.a
            libSDL2_ttf.a
            libSDL2_mixer.a
            libpython3.12.a
            libfreetype.a
            libpng.a
            libjpeg.a
            libvorbis.a
            libogg.a
            libopus.a
            libopusfile.a
            libwebp.a
            libz.a
          EOF

          zip -r "$ZIP_NAME" "$STAGE"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "Created $ZIP_NAME ($(du -sh $ZIP_NAME | cut -f1))"

      - name: Upload final zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: renpy-ios-libs
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Print download instructions
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║   Build complete!                                        ║"
          echo "║                                                          ║"
          echo "║   Download the artifact:                                 ║"
          echo "║     Actions → this run → Artifacts → renpy-ios-libs     ║"
          echo "║                                                          ║"
          echo "║   Contents:                                              ║"
          echo "║     device/      → link into your Xcode project          ║"
          echo "║     simulator/   → run in Simulator                      ║"
          echo "║     universal/   → fat binary for local dev              ║"
          echo "╚══════════════════════════════════════════════════════════╝"
