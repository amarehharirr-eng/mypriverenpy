# ============================================================
#  Ren'Py iOS Library Builder  (arm64 / real device only)
#  Builds: libSDL2.a, libSDL2_image.a, libSDL2_ttf.a,
#          libSDL2_mixer.a, libpython3.12.a and companions
#  SDK:    iPhoneOS18.4.sdk from xybp888/iOS-SDKs
# ============================================================

name: Build Ren'Py iOS Libraries (arm64)

on:
  workflow_dispatch:
    inputs:
      ios_sdk_version:
        description: "iOS SDK version (from xybp888/iOS-SDKs, e.g. 18.4)"
        required: false
        default: "18.4"

env:
  RENPY_BUILD_REF: "master"
  IOS_SDK_VERSION: ${{ github.event.inputs.ios_sdk_version || '18.4' }}

  # ── Hardcoded source versions matching renpy-build/master ──
  # Check tasks/sdl2*.py in renpy-build if you ever update the ref.
  SDL2_VER: "2.0.20"
  SDL2_IMAGE_VER: "2.6.2"
  SDL2_TTF_VER: "2.20.2"
  SDL2_MIXER_VER: "2.6.3"

jobs:
  build:
    name: "Build ios/arm64"
    runs-on: macos-14            # Apple Silicon — required for iOS cross-compile
    timeout-minutes: 180

    steps:
      # ── 1. Checkout renpy-build ──────────────────────────────
      - name: Checkout renpy-build
        uses: actions/checkout@v4
        with:
          repository: renpy/renpy-build
          ref: ${{ env.RENPY_BUILD_REF }}
          path: renpy-build

      # ── 2. Python 3.12 (host tooling) ───────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Homebrew deps ─────────────────────────────────────
      - name: Install build dependencies
        run: |
          brew update
          brew install \
            autoconf automake libtool pkg-config \
            nasm yasm cmake ninja wget

      # ── 4. iOS SDK (sparse clone – only the one folder) ──────
      - name: Fetch iOS SDK from xybp888/iOS-SDKs
        run: |
          SDK_NAME="iPhoneOS${IOS_SDK_VERSION}.sdk"
          echo "Fetching $SDK_NAME …"

          git clone \
            --depth 1 \
            --filter=blob:none \
            --sparse \
            https://github.com/xybp888/iOS-SDKs.git \
            ios-sdks-sparse

          cd ios-sdks-sparse
          git sparse-checkout set "$SDK_NAME"
          cd ..

          # Stage it where renpy-build can find it
          mkdir -p sdk-staging
          cp -r "ios-sdks-sparse/$SDK_NAME" "sdk-staging/$SDK_NAME"

          # Also drop it into the active Xcode platform so xcrun resolves it
          XCODE_SDKS="$(xcode-select -p)/Platforms/iPhoneOS.platform/Developer/SDKs"
          sudo mkdir -p "$XCODE_SDKS"
          sudo cp -r "sdk-staging/$SDK_NAME" "$XCODE_SDKS/$SDK_NAME" || true

          echo "IOS_SDK_PATH=$PWD/sdk-staging/$SDK_NAME" >> "$GITHUB_ENV"
          echo "SDK_NAME=$SDK_NAME"                      >> "$GITHUB_ENV"

      # ── 5. Download all source tarballs ──────────────────────
      # renpy-build reads tarballs from ./tars/ — we pre-populate
      # them with the exact versions it expects.
      - name: Download SDL2 source tarballs
        working-directory: renpy-build
        run: |
          mkdir -p tars
          cd tars

          BASE_SDL="https://github.com/libsdl-org"

          download() {
            local file="$1"; local url="$2"
            if [ -f "$file" ]; then
              echo "  already present: $file"
            else
              echo "  downloading: $file"
              curl -fsSL --retry 3 -o "$file" "$url"
            fi
          }

          # SDL2 — note the older release URL format
          download "SDL2-${SDL2_VER}.tar.gz" \
            "${BASE_SDL}/SDL/releases/download/release-${SDL2_VER}/SDL2-${SDL2_VER}.tar.gz"

          # SDL2_image
          download "SDL2_image-${SDL2_IMAGE_VER}.tar.gz" \
            "${BASE_SDL}/SDL_image/releases/download/release-${SDL2_IMAGE_VER}/SDL2_image-${SDL2_IMAGE_VER}.tar.gz"

          # SDL2_ttf
          download "SDL2_ttf-${SDL2_TTF_VER}.tar.gz" \
            "${BASE_SDL}/SDL_ttf/releases/download/release-${SDL2_TTF_VER}/SDL2_ttf-${SDL2_TTF_VER}.tar.gz"

          # SDL2_mixer
          download "SDL2_mixer-${SDL2_MIXER_VER}.tar.gz" \
            "${BASE_SDL}/SDL_mixer/releases/download/release-${SDL2_MIXER_VER}/SDL2_mixer-${SDL2_MIXER_VER}.tar.gz"

          echo ""
          echo "=== tars/ contents ==="
          ls -lh

      # ── 6. Prepare Python venv + build tools ─────────────────
      - name: Prepare build environment (venv + cython)
        working-directory: renpy-build
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install cython setuptools wheel requests

      # ── 7. Run renpy-build prepare ───────────────────────────
      # prepare.sh downloads additional tarballs (Python, FreeType, etc.)
      # and sets up the ndk/toolchain wrappers.
      - name: Run prepare.sh
        working-directory: renpy-build
        run: |
          source venv/bin/activate
          # prepare.sh may prompt; we answer non-interactively
          export DEBIAN_FRONTEND=noninteractive
          bash prepare.sh || true   # 'true' because it may exit non-zero
                                    # on macOS for Linux-only steps

      # ── 8. Build ─────────────────────────────────────────────
      - name: Build ios/arm64
        working-directory: renpy-build
        env:
          RENPY_IOS_SDK: ${{ env.IOS_SDK_PATH }}
        run: |
          source venv/bin/activate

          # Expose our custom SDK to the build system
          export RENPY_IOS_SDK="$IOS_SDK_PATH"
          export SDKROOT="$IOS_SDK_PATH"

          ./build.sh \
            --platform ios \
            --arch arm64 \
            --python 3

      # ── 9. Collect .a files ───────────────────────────────────
      - name: Collect built libraries
        run: |
          mkdir -p output/lib output/include

          # renpy-build installs to tmp/install/ios-arm64/
          INSTALL_BASE="renpy-build/tmp/install/ios-arm64"

          if [ -d "$INSTALL_BASE/lib" ]; then
            cp "$INSTALL_BASE"/lib/*.a output/lib/ 2>/dev/null || true
          fi

          # Fall back: find all .a files anywhere under tmp/
          find renpy-build/tmp -name "*.a" | while read f; do
            dest="output/lib/$(basename $f)"
            [ -f "$dest" ] || cp "$f" "$dest"
          done

          # Headers
          [ -d "$INSTALL_BASE/include" ] && \
            cp -r "$INSTALL_BASE/include/." output/include/ || true

          echo ""
          echo "=== Built libraries ==="
          ls -lh output/lib/*.a 2>/dev/null || echo "(no .a files found — check build log)"

          echo ""
          echo "=== Key libraries check ==="
          for lib in libSDL2.a libSDL2_image.a libSDL2_ttf.a libSDL2_mixer.a libpython3.12.a; do
            if [ -f "output/lib/$lib" ]; then
              echo "  ✓ $lib  ($(du -sh output/lib/$lib | cut -f1))"
            else
              echo "  ✗ $lib  NOT FOUND"
            fi
          done

      # ── 10. Zip everything ────────────────────────────────────
      - name: Create zip archive
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          ZIP="renpy-ios-arm64-libs-${TIMESTAMP}.zip"

          # Write a readme
          cat > output/README.txt << 'EOF'
          Ren'Py iOS arm64 Libraries
          ==========================
          Platform : iOS arm64 (real device)
          Builder  : GitHub Actions / renpy-build master
          SDK      : xybp888/iOS-SDKs

          Usage
          -----
          Add the .a files to your Xcode project under
          Build Phases → Link Binary With Libraries.
          Set the Header Search Paths to point at include/.

          Key libraries
          -------------
          libSDL2.a           — core SDL2
          libSDL2_image.a     — PNG/JPG/WebP image loading
          libSDL2_ttf.a       — TrueType font rendering
          libSDL2_mixer.a     — audio / music playback
          libpython3.12.a     — embedded Python 3.12
          libfreetype.a       — FreeType font engine
          libpng.a            — PNG support
          libjpeg.a           — JPEG support
          libvorbis.a / libogg.a — Ogg Vorbis audio
          libopus.a / libopusfile.a — Opus audio
          libwebp.a           — WebP image support
          libz.a              — zlib compression
          EOF

          zip -r "$ZIP" output/
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          echo ""
          echo "Archive: $ZIP  ($(du -sh $ZIP | cut -f1))"

      # ── 11. Upload artifact ───────────────────────────────────
      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: renpy-ios-arm64-libs
          path: ${{ env.ZIP }}
          retention-days: 30

      - name: Summary
        run: |
          echo "## Build complete! 🎉" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the zip from **Actions → this run → Artifacts → renpy-ios-arm64-libs**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Libraries built" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          ls output/lib/*.a 2>/dev/null | xargs -I{} basename {} >> "$GITHUB_STEP_SUMMARY" || echo "(check build log)" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
