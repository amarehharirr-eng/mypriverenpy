name: Build Ren'Py iOS Toolchain

# Builds static libraries for SDL2, SDL2_image, SDL2_ttf, SDL2_mixer (plus their
# codec dependencies: libpng, libjpeg-turbo, libwebp, freetype, libogg, libvorbis)
# and Python 3.12 for iOS (arm64, real devices), then zips the whole toolchain and
# uploads it as a workflow artifact.
#
# This must run on a macOS runner because the final link step needs Apple's clang/ld
# and the iOS SDK frameworks. It pins the runner to Xcode 16.4 (GitHub's default Xcode
# on macos-latest at time of writing) and uses that Xcode's bundled iPhoneOS 18.5 SDK
# directly via `xcrun --sdk iphoneos --show-sdk-path`, rather than pulling a synthetic/
# newer SDK from a third-party repo - this avoids compatibility landmines where Apple
# has started removing headers (e.g. libkern/OSAtomic.h) from newer SDK snapshots.
#
# Trigger manually from the Actions tab (workflow_dispatch). All inputs have sane
# defaults, so the first run can just hit "Run workflow" with nothing changed.

on:
  workflow_dispatch:
    inputs:
      ios_sdk_version:
        description: "Informational only - this workflow now uses the iPhoneOS SDK bundled with Xcode 16.4 (18.5), not a downloaded SDK. Kept for BUILD_INFO.txt labeling / future use."
        required: false
        default: "18.5"
      ios_deployment_target:
        description: "Minimum iOS version the libraries will support"
        required: false
        default: "13.0"
      python_branch:
        description: "Branch of beeware/Python-Apple-support to build (Python version)"
        required: false
        default: "3.12"
      sdl2_ref:
        description: "Git ref of libsdl-org/SDL to build"
        required: false
        default: "SDL2"
      sdl2_image_ref:
        description: "Git tag of libsdl-org/SDL_image to build"
        required: false
        default: "release-2.8.2"
      sdl2_ttf_ref:
        description: "Git tag of libsdl-org/SDL_ttf to build"
        required: false
        default: "release-2.22.0"
      sdl2_mixer_ref:
        description: "Git tag of libsdl-org/SDL_mixer to build"
        required: false
        default: "release-2.8.0"

jobs:
  build:
    # macos-latest gets you a recent Xcode automatically. Pin to e.g. macos-15 instead
    # if you want a reproducible runner image once you've confirmed it's available to
    # your account/org.
    runs-on: macos-latest
    timeout-minutes: 180

    env:
      IOS_SDK_VERSION: ${{ github.event.inputs.ios_sdk_version || '18.5' }}
      IOS_DEPLOYMENT_TARGET: ${{ github.event.inputs.ios_deployment_target || '13.0' }}
      PYTHON_BRANCH: ${{ github.event.inputs.python_branch || '3.12' }}
      SDL2_REF: ${{ github.event.inputs.sdl2_ref || 'SDL2' }}
      SDL2_IMAGE_REF: ${{ github.event.inputs.sdl2_image_ref || 'release-2.8.2' }}
      SDL2_TTF_REF: ${{ github.event.inputs.sdl2_ttf_ref || 'release-2.22.0' }}
      SDL2_MIXER_REF: ${{ github.event.inputs.sdl2_mixer_ref || 'release-2.8.0' }}
      PREFIX: ${{ github.workspace }}/build/ios-arm64
      SRC: ${{ github.workspace }}/build/src
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          set -euo pipefail
          brew install cmake ninja

      # --------------------------------------------------------------------
      # Pin to Xcode 16.4 (bundled iPhoneOS SDK 18.5). This is GitHub's
      # default Xcode on macos-latest at time of writing, and using the
      # SDK Xcode actually ships avoids the landmines that come with
      # sysroot-ing into a synthetic/very-new SDK pulled from a third-party
      # repo (e.g. headers Apple has already started removing upstream,
      # like libkern/OSAtomic.h in newer SDKs).
      # --------------------------------------------------------------------
      - name: Select Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show toolchain versions
        run: |
          set -euo pipefail
          xcodebuild -version
          echo "Bundled iphoneos SDK: $(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || echo 'none found')"
          clang --version
          cmake --version
          ninja --version

      - name: Prepare build directories
        run: |
          set -euo pipefail
          mkdir -p "$PREFIX" "$SRC"
          echo "JOBS=$(sysctl -n hw.ncpu)" >> "$GITHUB_ENV"

      # --------------------------------------------------------------------
      # Use the iPhoneOS SDK bundled with Xcode 16.4 (iOS 18.5) instead of
      # pulling a synthetic SDK from a third-party repo. ios_sdk_version is
      # no longer used for SDK selection now that we're on the real
      # Xcode-bundled SDK, but the input is left in place in case you want
      # to switch back to the xybp888/iOS-SDKs approach for a newer target
      # later.
      # --------------------------------------------------------------------
      - name: Resolve iOS SDK path
        run: |
          set -euo pipefail
          SDK_DIR="$(xcrun --sdk iphoneos --show-sdk-path)"
          if [ ! -d "$SDK_DIR/usr/include" ]; then
            echo "::error::xcrun did not return a usable iphoneos SDK path: $SDK_DIR"
            exit 1
          fi
          echo "SDKROOT=$SDK_DIR" >> "$GITHUB_ENV"
          echo "Using SDK: $SDK_DIR"

      # --------------------------------------------------------------------
      # A small CMake toolchain file that cross-compiles for iOS arm64
      # (real devices) using the Xcode-bundled SDK resolved in the previous
      # step. SDKROOT is read from the environment at configure time.
      #
      # We intentionally do NOT build our own zlib: iOS ships zlib as a
      # public system library (libz.tbd in the SDK), so everything below
      # links against that instead of bundling a duplicate static copy.
      #
      # -Wno-declaration-after-statement is added here too, but note: SDL2's
      # own configure-derived EXTRA_CFLAGS appends
      # -Werror=declaration-after-statement AFTER this on the final compile
      # line, so this alone does NOT suppress it for SDL2 - see the targeted
      # per-file patch in the "Build SDL2" step below for the fix that
      # actually wins. It's left here anyway since it's harmless and may
      # help other libraries in this list that don't re-add the -Werror.
      # --------------------------------------------------------------------
      - name: Write CMake iOS toolchain file
        run: |
          set -euo pipefail
          cat > "$GITHUB_WORKSPACE/build/ios.toolchain.cmake" << 'EOF'
          if(NOT DEFINED SDKROOT)
            if(DEFINED ENV{SDKROOT})
              set(SDKROOT "$ENV{SDKROOT}")
            else()
              message(FATAL_ERROR "SDKROOT is not set")
            endif()
          endif()

          if(NOT DEFINED DEPLOYMENT_TARGET)
            if(DEFINED ENV{IOS_DEPLOYMENT_TARGET})
              set(DEPLOYMENT_TARGET "$ENV{IOS_DEPLOYMENT_TARGET}")
            else()
              set(DEPLOYMENT_TARGET "13.0")
            endif()
          endif()

          set(CMAKE_SYSTEM_NAME iOS)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_OSX_ARCHITECTURES arm64 CACHE STRING "" FORCE)
          set(CMAKE_OSX_SYSROOT "${SDKROOT}" CACHE PATH "" FORCE)
          set(CMAKE_OSX_DEPLOYMENT_TARGET "${DEPLOYMENT_TARGET}" CACHE STRING "" FORCE)

          set(CMAKE_C_COMPILER /usr/bin/clang)
          set(CMAKE_CXX_COMPILER /usr/bin/clang++)

          set(CMAKE_C_FLAGS_INIT "-isysroot ${SDKROOT} -miphoneos-version-min=${DEPLOYMENT_TARGET} -fvisibility=hidden -Wno-declaration-after-statement")
          set(CMAKE_CXX_FLAGS_INIT "${CMAKE_C_FLAGS_INIT}")

          set(BUILD_SHARED_LIBS OFF CACHE BOOL "" FORCE)

          set(CMAKE_FIND_ROOT_PATH "${SDKROOT}" "${CMAKE_INSTALL_PREFIX}")
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY BOTH)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE BOTH)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE BOTH)
          EOF
          cat "$GITHUB_WORKSPACE/build/ios.toolchain.cmake"

      # --------------------------------------------------------------------
      # libpng (needs the system zlib)
      # --------------------------------------------------------------------
      - name: Build libpng
        run: |
          set -euo pipefail
          cd "$SRC"
          curl -fL -o libpng.tar.gz "https://github.com/pnggroup/libpng/archive/refs/tags/v1.6.44.tar.gz"
          mkdir -p libpng-src && tar xzf libpng.tar.gz -C libpng-src --strip-components=1
          cmake -S libpng-src -B libpng-build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build/ios.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DPNG_SHARED=OFF -DPNG_STATIC=ON -DPNG_TESTS=OFF -DPNG_TOOLS=OFF
          cmake --build libpng-build --parallel "$JOBS"
          cmake --install libpng-build

      # --------------------------------------------------------------------
      # libjpeg-turbo (SIMD disabled for build reliability across versions;
      # drop -DWITH_SIMD=OFF if you want to chase the extra performance)
      # --------------------------------------------------------------------
      - name: Build libjpeg-turbo
        run: |
          set -euo pipefail
          cd "$SRC"
          curl -fL -o libjpeg-turbo.tar.gz "https://github.com/libjpeg-turbo/libjpeg-turbo/archive/refs/tags/3.0.4.tar.gz"
          mkdir -p libjpeg-turbo-src && tar xzf libjpeg-turbo.tar.gz -C libjpeg-turbo-src --strip-components=1
          cmake -S libjpeg-turbo-src -B libjpeg-turbo-build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build/ios.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DENABLE_SHARED=OFF -DENABLE_STATIC=ON -DWITH_SIMD=OFF
          cmake --build libjpeg-turbo-build --parallel "$JOBS"
          cmake --install libjpeg-turbo-build

      # --------------------------------------------------------------------
      # libwebp
      # --------------------------------------------------------------------
      - name: Build libwebp
        run: |
          set -euo pipefail
          cd "$SRC"
          curl -fL -o libwebp.tar.gz "https://github.com/webmproject/libwebp/archive/refs/tags/v1.4.0.tar.gz"
          mkdir -p libwebp-src && tar xzf libwebp.tar.gz -C libwebp-src --strip-components=1
          cmake -S libwebp-src -B libwebp-build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build/ios.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DWEBP_BUILD_ANIM_UTILS=OFF -DWEBP_BUILD_CWEBP=OFF -DWEBP_BUILD_DWEBP=OFF \
            -DWEBP_BUILD_GIF2WEBP=OFF -DWEBP_BUILD_IMG2WEBP=OFF -DWEBP_BUILD_VWEBP=OFF \
            -DWEBP_BUILD_WEBPINFO=OFF -DWEBP_BUILD_WEBPMUX=OFF -DWEBP_BUILD_EXTRAS=OFF
          cmake --build libwebp-build --parallel "$JOBS"
          cmake --install libwebp-build

      # --------------------------------------------------------------------
      # freetype (needed by SDL2_ttf). Harfbuzz/Brotli/BZip2 turned off to
      # avoid pulling in even more dependencies; PNG/zlib stay on since we
      # already have both.
      # --------------------------------------------------------------------
      - name: Build freetype
        run: |
          set -euo pipefail
          cd "$SRC"
          curl -fL -o freetype.tar.gz "https://download.savannah.gnu.org/releases/freetype/freetype-2.13.3.tar.gz"
          mkdir -p freetype-src && tar xzf freetype.tar.gz -C freetype-src --strip-components=1
          cmake -S freetype-src -B freetype-build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build/ios.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DFT_DISABLE_HARFBUZZ=ON -DFT_DISABLE_BROTLI=ON -DFT_DISABLE_BZIP2=ON
          cmake --build freetype-build --parallel "$JOBS"
          cmake --install freetype-build

      # --------------------------------------------------------------------
      # libogg + libvorbis (needed by SDL2_mixer for .ogg playback)
      # --------------------------------------------------------------------
      - name: Build libogg
        run: |
          set -euo pipefail
          cd "$SRC"
          curl -fL -o libogg.tar.gz "https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.gz"
          mkdir -p libogg-src && tar xzf libogg.tar.gz -C libogg-src --strip-components=1
          cmake -S libogg-src -B libogg-build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build/ios.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DBUILD_TESTING=OFF
          cmake --build libogg-build --parallel "$JOBS"
          cmake --install libogg-build

      - name: Build libvorbis
        run: |
          set -euo pipefail
          cd "$SRC"
          curl -fL -o libvorbis.tar.gz "https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.gz"
          mkdir -p libvorbis-src && tar xzf libvorbis.tar.gz -C libvorbis-src --strip-components=1
          cmake -S libvorbis-src -B libvorbis-build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build/ios.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DOGG_INCLUDE_DIR="$PREFIX/include" -DOGG_LIBRARY="$PREFIX/lib/libogg.a"
          cmake --build libvorbis-build --parallel "$JOBS"
          cmake --install libvorbis-build

      # --------------------------------------------------------------------
      # SDL2 itself. Source defaults to Ren'Py's own SDL2 fork, which only
      # has a "master" branch (no release tags exist on this fork - if you
      # want to build vanilla upstream SDL2 with real tags instead, point
      # sdl2_ref/the clone URL at libsdl-org/SDL).
      #
      # One iOS compatibility patch is applied to the freshly cloned source
      # before configuring:
      #
      #   SDL_rwopsbundlesupport.m fails to compile under
      #   -Werror=declaration-after-statement (which SDL's own
      #   configure-derived EXTRA_CFLAGS adds unconditionally on Apple
      #   targets). Passing -Wno-declaration-after-statement via
      #   CMAKE_C_FLAGS does NOT win here: CMake places CMAKE_C_FLAGS
      #   *before* each target's own EXTRA_CFLAGS on the compile line, and
      #   Clang's "last flag wins" rule means SDL's own -Werror always
      #   overrides it regardless of where the suppression flag is injected
      #   from on the CMake side. The reliable fix is a per-file #pragma,
      #   which applies after all command-line flags and isn't subject to
      #   that ordering problem.
      #
      # (An earlier version of this workflow also patched SDL_spinlock.c to
      # replace OSAtomicCompareAndSwap32Barrier, since that symbol's header
      # - libkern/OSAtomic.h - has been removed from newer/synthetic iOS
      # SDKs. The real Xcode 16.4 / iPhoneOS 18.5 SDK used now still ships
      # that header, so the patch isn't needed here. If you switch to a
      # newer SDK and hit "call to undeclared function
      # OSAtomicCompareAndSwap32Barrier" again, that patch can be reinstated.)
      #
      # SDL_OPENGL=OFF / SDL_OPENGLES=ON below are also required: SDL2's
      # CMake renderer auto-detection was building the desktop OpenGL
      # backend (SDL_render_gl.c / SDL_shaders_gl.c) even on this iOS
      # target, which fails outright since iOS has never shipped desktop
      # OpenGL (GLuint, GLhandleARB, PFNGL...ARBPROC etc. don't exist in the
      # iOS SDK - only OpenGL ES does). Disabling SDL_OPENGL explicitly
      # stops those two files from being compiled at all, leaving the
      # OpenGL ES2 backend (SDL_render_gles2.c), which already builds fine.
      # --------------------------------------------------------------------
      - name: Build SDL2
        run: |
          set -euo pipefail

          git clone --depth 1 \
            --branch "$SDL2_REF" \
            https://github.com/libsdl-org/SDL.git \
            "$SRC/SDL2"

          cmake -S "$SRC/SDL2" -B "$SRC/SDL2-build" -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build/ios.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DSDL_STATIC=ON \
            -DSDL_SHARED=OFF \
            -DSDL_TEST=OFF \
            -DSDL_OPENGL=OFF \
            -DSDL_OPENGLES=ON

          cmake --build "$SRC/SDL2-build" --parallel "$JOBS"
          cmake --install "$SRC/SDL2-build"

      - name: Build SDL2_image
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$SDL2_IMAGE_REF" https://github.com/libsdl-org/SDL_image.git "$SRC/SDL2_image"
          cmake -S "$SRC/SDL2_image" -B "$SRC/SDL2_image-build" -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build/ios.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DSDL2_DIR="$PREFIX/lib/cmake/SDL2" \
            -DBUILD_SHARED_LIBS=OFF -DSDL2IMAGE_VENDORED=OFF -DSDL2IMAGE_SAMPLES=OFF \
            -DSDL2IMAGE_AVIF=OFF -DSDL2IMAGE_JXL=OFF -DSDL2IMAGE_TIF=OFF
          cmake --build "$SRC/SDL2_image-build" --parallel "$JOBS"
          cmake --install "$SRC/SDL2_image-build"

      - name: Build SDL2_ttf
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$SDL2_TTF_REF" https://github.com/libsdl-org/SDL_ttf.git "$SRC/SDL2_ttf"
          cmake -S "$SRC/SDL2_ttf" -B "$SRC/SDL2_ttf-build" -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build/ios.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DSDL2_DIR="$PREFIX/lib/cmake/SDL2" \
            -DBUILD_SHARED_LIBS=OFF -DSDL2TTF_VENDORED=OFF -DSDL2TTF_HARFBUZZ=OFF -DSDL2TTF_SAMPLES=OFF
          cmake --build "$SRC/SDL2_ttf-build" --parallel "$JOBS"
          cmake --install "$SRC/SDL2_ttf-build"

      - name: Build SDL2_mixer
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$SDL2_MIXER_REF" https://github.com/libsdl-org/SDL_mixer.git "$SRC/SDL2_mixer"
          cmake -S "$SRC/SDL2_mixer" -B "$SRC/SDL2_mixer-build" -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/build/ios.toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DSDL2_DIR="$PREFIX/lib/cmake/SDL2" \
            -DBUILD_SHARED_LIBS=OFF -DSDL2MIXER_VENDORED=OFF -DSDL2MIXER_SAMPLES=OFF \
            -DSDL2MIXER_MOD=OFF -DSDL2MIXER_MIDI=OFF -DSDL2MIXER_OPUS=OFF \
            -DSDL2MIXER_FLAC=ON -DSDL2MIXER_MP3=ON -DSDL2MIXER_VORBIS=VORBISFILE
          cmake --build "$SRC/SDL2_mixer-build" --parallel "$JOBS"
          cmake --install "$SRC/SDL2_mixer-build"

      # --------------------------------------------------------------------
      # Python 3.12 for iOS. CPython's own iOS support (PEP 730) only landed
      # in 3.13, but BeeWare backported it to 3.9-3.12, and their
      # Python-Apple-support project is the proven, maintained way to get a
      # working static interpreter + stdlib for iOS. `make iOS` produces a
      # Python.xcframework containing arm64-device and arm64-simulator
      # slices, which is the modern Apple-recommended way to hand a Python
      # build to an Xcode project.
      # --------------------------------------------------------------------
      - name: Build Python (BeeWare Python-Apple-support)
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$PYTHON_BRANCH" \
            https://github.com/beeware/Python-Apple-support.git "$SRC/Python-Apple-support"
          cd "$SRC/Python-Apple-support"
          make iOS
          XCFRAMEWORK="$(find . -maxdepth 4 -iname 'Python.xcframework' -print -quit)"
          if [ -z "$XCFRAMEWORK" ]; then
            echo "::error::Python.xcframework was not produced - check the build log above."
            exit 1
          fi
          echo "PYTHON_XCFRAMEWORK=$SRC/Python-Apple-support/${XCFRAMEWORK#./}" >> "$GITHUB_ENV"

      # --------------------------------------------------------------------
      # Collect every static library + the Python build into one folder and
      # zip it up for the artifact.
      # --------------------------------------------------------------------
      - name: Package toolchain
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/renpy-ios-toolchain"
          mkdir -p "$OUT/lib" "$OUT/include" "$OUT/python"

          # Only static libraries - never ship the throwaway .dylibs some of
          # these CMake builds produce alongside the static archives.
          find "$PREFIX/lib" -name "*.a" -exec cp {} "$OUT/lib/" \;
          cp -R "$PREFIX/include/." "$OUT/include/"
          cp -R "$PYTHON_XCFRAMEWORK" "$OUT/python/Python.xcframework"

          # Pull a flat libpython3.12.a out of the xcframework's device slice
          # too, for tooling that expects a plain static lib rather than a
          # framework bundle.
          DEVICE_SLICE="$(find "$OUT/python/Python.xcframework" -maxdepth 1 -iname 'ios-arm64' -print -quit)"
          if [ -n "$DEVICE_SLICE" ]; then
            find "$DEVICE_SLICE" -iname "libpython*.a" -exec cp {} "$OUT/lib/" \;
          fi

          cat > "$OUT/BUILD_INFO.txt" << INFO
          Ren'Py iOS toolchain
          Built: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          iOS SDK: $IOS_SDK_VERSION (Xcode-bundled, via xcrun --sdk iphoneos --show-sdk-path)
          Deployment target: iOS $IOS_DEPLOYMENT_TARGET, arm64 device only
          SDL2: renpy/SDL2 @ $SDL2_REF
          SDL2_image: libsdl-org/SDL_image @ $SDL2_IMAGE_REF
          SDL2_ttf: libsdl-org/SDL_ttf @ $SDL2_TTF_REF
          SDL2_mixer: libsdl-org/SDL_mixer @ $SDL2_MIXER_REF
          Python: beeware/Python-Apple-support @ $PYTHON_BRANCH
          zlib: system (libz.tbd from the iOS SDK, not rebuilt)
          INFO

          cd "$GITHUB_WORKSPACE"
          zip -r renpy-ios-toolchain.zip renpy-ios-toolchain
          echo "Zip contents:"
          unzip -l renpy-ios-toolchain.zip | tail -n +2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: renpy-ios-toolchain
          path: renpy-ios-toolchain.zip
          if-no-files-found: error
          retention-days: 14
